<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${customer.id == null} ? 'Add Customer' : 'Edit Customer'">Customer Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <h2 th:text="${customer.id == null} ? 'Add Customer' : 'Edit Customer'">Customer Form</h2>

    <form th:action="@{/customer/save}" th:object="${customer}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="loginId">Login ID</label>
            <input type="text" id="loginId" th:field="*{loginId}" placeholder="Matches web-user loginId" required>
        </div>

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" th:field="*{firstName}" placeholder="First name" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" th:field="*{lastName}" placeholder="Last name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" th:field="*{phone}" placeholder="Phone (optional)">
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" th:field="*{address}" placeholder="Address (optional)">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-inline">Save</button>
            <a class="btn btn-secondary btn-inline" th:href="@{/customers}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
